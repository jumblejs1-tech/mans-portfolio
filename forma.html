<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Formas</title>
    <link rel="stylesheet" href="css/stils.css" type="text/css">
</head>
<body>

    <h1>Formas un ievadlauku piemērs</h1>

    <form>
        <p>
            "Šodienas datums"
            <input name="datums">
        </p>
        <p>
            "Ja gribi uzzināt šodienas datumu, spied pogu DATUMS"
            <input onclick="datums.value=new Date();" name="poga" value="DATUMS" type="button">
        </p>
        <p>
            "Ja gribi izdzēst datuma lodziņa saturu, spied pogu RESET"
            <input value="RESET" type="reset">
        </p>
    </form>

    <form>
        <div>
            "1.skaitlis"
            <input type="text" name="sk1">
        </div>

        <div style="margin: 10px 0;">
            <input type="button" value="+" onclick="rez.value = Number(sk1.value) + Number(sk2.value)">
            <input type="button" value="-" onclick="rez.value = sk1.value - sk2.value">
            <input type="button" value="X" onclick="rez.value = sk1.value * sk2.value">
            <input type="button" value="/" onclick="rez.value = sk1.value / sk2.value">
        </div>

        <div>
            "2.skaitlis"
            <input type="text" name="sk2">
        </div>

        <hr>

        <div>
            "Rezultāts"
            <input name="rez">
        </div>

        <div style="margin-top: 10px;">
            <input type="reset" value="RESET">
        </div>
    </form>
<a href="index.html">Sākums</a>
</body>
</html>
