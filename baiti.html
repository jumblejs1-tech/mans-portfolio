<form style="border: 1px solid #e0e0e0; padding: 15px; display: inline-block; font-family: sans-serif;">
    
    Aprēķināt cik daudz informācijas var lejupielādēt<br>
    
    <input type="number" id="sekundes" onfocus="this.form.reset()"> sekundēs, ja interneta ātrums ir 25 Mbps.
    
    <br><br>
    
    Atbilde<br>
    <input type="text" id="atbilde"> 
    
    <input type="radio" name="mervieniba" id="kib" onclick="aprekinat()"> KiB
    <input type="radio" name="mervieniba" id="kb" onclick="aprekinat()"> KB

</form>

<script>

    function aprekinat() {

        let sekundes = document.getElementById("sekundes").value;

        let baiti = sekundes * 3125000; 

        if (document.getElementById("kib").checked) {
            document.getElementById("atbilde").value = baiti / 1024; 
        } else if (document.getElementById("kb").checked) {
            document.getElementById("atbilde").value = baiti / 1000; 
        }
    }
</script>
